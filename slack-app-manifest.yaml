display_information:
  name: Log Analyzer Bot
  description: Upload a log file and get a threaded root-cause summary.
  background_color: "#2f6c5a"

features:
  bot_user:
    display_name: Log Analyzer Bot
    always_online: false

oauth_config:
  scopes:
    bot:
      - app_mentions.read
      - chat:write
      - files:read
      - channels:read
      - channels:history

settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
